<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}pi-muselinn-harness</title>
  <meta name="description" content="Kimi Code-style agent orchestration harness for the Pi coding agent — swarm, goal, plan, permission, task, hooks, skills, boxed-editor TUI.">
  <script>
    // Theme + lang init before first paint (no FOUC).
    (function () {
      var t = null, l = null;
      try { t = localStorage.getItem("theme"); l = localStorage.getItem("lang"); } catch (e) { /* private mode */ }
      if (!t) t = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
      if (!l) l = (navigator.language || "en").toLowerCase().indexOf("zh") === 0 ? "zh" : "en";
      document.documentElement.setAttribute("data-theme", t);
      document.documentElement.setAttribute("data-lang", l);
    })();
  </script>
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/img/favicon.svg' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <nav class="topnav">
    <span class="brand"><img class="brand-logo" src="{{ '/assets/img/brand.svg' | relative_url }}" alt=""> π <b>muselinn-harness</b></span>
    <span class="navlinks">
      <a href="https://muselinn.github.io/pi-muselinn-harness/">Home</a>
      <a href="https://muselinn.github.io/pi-muselinn-harness/self-hosting">Guide</a>
      <a href="https://github.com/MuseLinn/pi-muselinn-harness">GitHub</a>
      <a href="https://www.npmjs.com/package/pi-muselinn-harness">npm</a>
      <a href="https://pi.dev/packages">pi.dev</a>
      <button id="lang-toggle" class="lang-toggle" type="button">中</button>
      <button id="theme-toggle" class="theme-toggle" type="button">☀</button>
    </span>
  </nav>
  <main>
    {{ content }}
  </main>
  <footer>
    <span>pi-muselinn-harness · MIT License</span>
    <span>built for <a href="https://pi.dev">pi</a></span>
  </footer>
  <script src="{{ '/assets/js/swarm-demo.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
